name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VPS_HOST: 69.62.80.229
      VPS_PORT: 22
      VPS_USER: myadmin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY secret is not configured."
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/known_hosts <<'EOF'
          69.62.80.229 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMM1CgdD9kpk0GYVBdJDrRmQ9TUGaxBUZuQ3zjL74thx
          69.62.80.229 ssh-rsa 
          69.62.80.229 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBCoDLcKch7lcqnS1XfR7tc+BinEG+7MDhIu3JHL4kDAys1oHwUUrM9seHatzUbJozu78imFOUwkh7AEUPnJCjyA=
          EOF
          chmod 644 ~/.ssh/known_hosts

      - name: Sync app to server
        run: |
          rsync -rtvz \
            -e "ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT" \
            --itemize-changes \
            --omit-dir-times \
            --no-owner \
            --no-group \
            --no-perms \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.venv/' \
            --exclude 'myenv/' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.env' \
            --exclude '*.sqlite3' \
            --exclude '*.log' \
            --exclude 'backups_*' \
            --exclude 'deploy_backups_*' \
            --exclude 'staticfiles/' \
            --exclude 'media/' \
            --exclude 'boss/' \
            --exclude 'config/' \
            --exclude 'server.log' \
            --exclude 'nohup.out' \
            --exclude 'gunicorn.sock' \
            --exclude 'leapnitpy.org' \
            --exclude 'ngrok' \
            --exclude 'ngrok*' \
            --exclude 'setup_leap_production.sh' \
            --exclude 'website/templates/' \
            ./ $VPS_USER@$VPS_HOST:/home/myadmin/LEAP/

      - name: Ensure deploy script is executable
        run: |
          ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT $VPS_USER@$VPS_HOST "chmod +x /home/myadmin/LEAP/deploy_leap.sh"

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -p $VPS_PORT $VPS_USER@$VPS_HOST "bash /home/myadmin/deploy_leap.sh"
