{# templates/_test_item.html #}

<div class="card shadow-sm mb-3">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h5 class="card-title mb-0">{{ test.test_name }}</h5>
            <small class="text-muted">ID: {{ test.test_id|truncatechars:12 }}</small>
        </div>
        <div>
            {% if test.attempted %}
                {% if test.result_released %}
                    <a href="{% url 'analyse' test_id=test.test_id %}" class="btn btn-outline-success">View Analysis</a>
                {% else %}
                    <button class="btn btn-outline-secondary" disabled>Attempted</button>
                {% endif %}
            {% else %}
                {% if test.available %}
                    <a href="{% url 'route_test' test_id=test.test_id %}" class="btn btn-success">Start Test</a>
                {% else %}
                    <button class="btn btn-outline-info" disabled>Not Available</button>
                {% endif %}
            {% endif %}
        </div>
    </div>
</div>
