{% extends "base.html" %}
{% block content %}
<h1>Materials for "{{ concept.name }}"</h1>

{% if materials %}
<div class="materials">
    {% for material in materials %}
    <div class="card" style="margin-bottom:16px; padding:16px; border:1px solid #ccc;">
        <h3>{{ material.name }}</h3>
        <a href="{{ material.attachment.url }}" target="_blank">
            <button>View</button>
        </a>
    </div>
    {% endfor %}
</div>
{% else %}
<p>No study materials uploaded for this concept.</p>
{% endif %}
<a href="{% url 'study:concepts_list' %}"><button>Back to Concepts</button></a>
{% endblock %}
