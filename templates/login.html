{% extends 'base.html' %}
{% load static %}
{% load socialaccount %}  {# Needed for provider_login_url #}

{% block title %}Signup{% endblock %}

{% block content %}
<section class="py-5 mt-5">
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">

            <!-- Left side illustration -->
            <div class="col-md-6 text-center d-none d-md-block">
                <img class="img-fluid w-75" src="{% static 'img/illustrations/register.svg' %}" alt="Signup Illustration">
            </div>

            <!-- Right side content -->
            <div class="col-md-5 col-xl-4 text-center text-md-start">
                <h2 class="display-6 fw-bold mb-4">
                    <span class="underline pb-1"><strong>Welcome</strong></span>
                </h2>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <!-- Google Signup Only -->
                <div class="mb-4">
                    <a href="{% provider_login_url 'google' %}" class="btn btn-danger shadow w-100 py-2 fs-5">
                        <i class="bi bi-google"></i> Continue with Google
                    </a>
                </div>

               
            </div>
        </div>
    </div>
</section>
{% endblock %}
